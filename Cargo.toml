[package]
name = "flowstate_rs"
version = "0.1.0"
edition = "2021"


[dependencies]
# Core dependencies
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ulid = { version = "1.0", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Metrics and monitoring
hdrhistogram = "7.5"
thiserror = "1.0"

# Optional metrics exporters
prometheus = { version = "0.13", optional = true }
statsd = { version = "0.16", optional = true }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Web server for metrics endpoint (optional)
warp = { version = "0.3", optional = true }

[dev-dependencies]
# Testing utilities
tokio-test = "0.4"
proptest = "1.0"
criterion = { version = "0.5", features = ["async_tokio"] }
fastrand = "2.0"
sysinfo = "0.29"
tempfile = "3.8"
futures = "0.3"

[features]
default = ["metrics-prometheus"]
metrics-prometheus = ["prometheus", "warp"]
metrics-statsd = ["statsd"]
full = ["metrics-prometheus", "metrics-statsd"]

[profile.release]
lto = true
codegen-units = 1

[[bench]]
name = "per_event_latency"
path = "bench/performance/per_event_latency.rs"
harness = false

